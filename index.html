<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Undangan Pernikahan Interaktif</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #111116; 
            overflow: hidden; 
            position: fixed; 
            
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overscroll-behavior-y: contain; 
        }
        
        .page { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            display: none; 
            justify-content: center; 
            align-items: center; 
        }
        .active { display: flex; }
        
        /* BINGKAI UTAMA GAME (Dikelola murni secara proporsional oleh Phaser) */
        .game-canvas-container {
            position: relative; 
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 450px;
            aspect-ratio: 16 / 9;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }
        
        canvas { image-rendering: pixelated; width: 100% !important; height: 100% !important; }

        /* PEMBERITAHUAN ROTASI */
        #rotate-instruction {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111116;
            color: #ffb804;
            z-index: 1000000; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'VT323', monospace;
            padding: 20px;
            box-sizing: border-box;
        }

        #rotate-instruction .icon-phone {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotateDevice 2s infinite ease-in-out;
        }

        #rotate-instruction h3 { font-size: 28px; margin: 0 0 10px 0; }
        #rotate-instruction p { font-size: 18px; color: #ffffff; margin: 0; }

        @keyframes rotateDevice {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="rotate-instruction">
        <div class="icon-phone">📱🔄</div>
        <h3>MOHON PUTAR PONSEL ANDA</h3>
        <p>Silakan aktifkan rotasi layar otomatis dan gunakan mode Landscape (Mendatar) untuk kenyamanan bermain.</p>
    </div>

    <div id="page1" class="page active">
        <div class="game-canvas-container" id="landing-bg-container"></div>
    </div>

    <div id="page2" class="page"><div class="game-canvas-container" id="game-mobil-container"></div></div>
    <div id="page3" class="page"><div class="game-canvas-container" id="game-side-container"></div></div>

<script>
    let currentMusic = null;

    // Fungsi deteksi orientasi bawaan untuk pop-up instruksi
    function cekOrientasi() {
        const pnlInstruksi = document.getElementById('rotate-instruction');
        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        if (isMobile && window.innerHeight > window.innerWidth) {
            pnlInstruksi.style.display = 'flex';
        } else {
            pnlInstruksi.style.display = 'none';
        }
    }
    window.addEventListener('resize', cekOrientasi);
    window.addEventListener('orientationchange', cekOrientasi);

    function bukaPage(pageNumber) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageNumber).classList.add('active');
        if (currentMusic) currentMusic.stop();

        if (pageNumber === 1) initLandingPage();
        else if (pageNumber === 2) initGameMobil();
        else if (pageNumber === 3) initGameSideScroller();
    }

    window.onload = () => { 
        initLandingPage(); 
        cekOrientasi();
    };

    function initLandingPage() {
        if (window.landingGame) {
            putarMusik(window.landingGame.scene.scenes[0], 'bgm_page1');
            return;
        }
        
        const configLanding = {
            type: Phaser.AUTO,
            width: 800, height: 450,
            parent: 'landing-bg-container',
            scale: {
                mode: Phaser.Scale.FIT, // Mengunci perbesaran proporsional 16:9 bawaan Phaser
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: { default: 'arcade' },
            scene: {
                preload: function() {
                    this.load.image('custom_bg', 'assets/background_kamu.png'); 
                    this.load.image('sun', 'assets/matahari.png');
                    this.load.image('cloud', 'assets/awan.png');
                    this.load.image('bird', 'assets/burung.png');
                    this.load.audio('bgm_page1', 'assets/audio_page1.mp3');
                },
                create: function() {
                    putarMusik(this, 'bgm_page1');

                    // --- 1. BACKGROUND ---
                    let bg = this.add.image(400, 225, 'custom_bg').setDisplaySize(800, 450);
                    bg.setDepth(0);

                    // --- 2. AWAN BERGERAK ---
                    this.clouds = this.physics.add.group();
                    for (let i = 0; i < 7; i++) {
                        let cl = this.clouds.create(i * 130 + Phaser.Math.Between(-30, 30), Phaser.Math.Between(30, 90), 'cloud');
                        cl.setVelocityX(Phaser.Math.Between(6, 12)); 
                        cl.setAlpha(0.6).setDepth(1); 
                    }

                    // --- 3. BURUNG BERGERAK ---
                    this.birds = this.physics.add.group();
                    for (let i = 0; i < 3; i++) {
                        let b = this.birds.create(Phaser.Math.Between(-300, -50), Phaser.Math.Between(100, 170), 'bird');
                        b.setScale(0.5).setVelocityX(Phaser.Math.Between(25, 40)).setDepth(2); 
                    }

                    // --- 4. MATAHARI ---
                    this.sun = this.add.sprite(400, 190, 'sun').setScale(0.7).setDepth(3); 
                    this.tweens.add({
                        targets: this.sun,
                        scale: { from: 0.68, to: 0.72 },
                        duration: 3500,
                        yoyo: true,
                        repeat: -1
                    });

                    // =========================================================================
                    // 🎯 SEKARANG TEKS & TOMBOL DICETAK DI DALAM PHASER (ANTI-BERANTAKAN)
                    // =========================================================================
                    
                    // Teks 1: THE WEDDING OF
                    this.add.text(400, 140, "THE WEDDING OF", {
                        fontFamily: "'VT323', monospace",
                        fontSize: "20px",
                        fill: "#ffb804",
                        letterSpacing: 2
                    }).setOrigin(0.5).setDepth(4).setShadow(2, 2, '#000000', 0);

                    // Teks 2: Mar'ie & Haiyi
                    this.add.text(400, 185, "Mar'ie & Haiyi", {
                        fontFamily: "'Playfair Display', serif",
                        fontSize: "38px",
                        fill: "#a5a5a5",
                        fontWeight: "bold"
                    }).setOrigin(0.5).setDepth(4).setShadow(2, 2, '#000000', 0);

                    // Teks 3: KETUK UNTUK MEMULAI PERJALANAN
                    this.add.text(400, 230, "KETUK UNTUK MEMULAI PERJALANAN", {
                        fontFamily: "'VT323', monospace",
                        fontSize: "18px",
                        fill: "#ffb804"
                    }).setOrigin(0.5).setDepth(4).setShadow(1, 1, '#000000', 0);

                    // --- TOMBOL MULAI ASLI PHASER ---
                    // Membuat kotak latar belakang tombol hijau (x: 400, y: 370, lebar: 120, tinggi: 40)
                    let btnBg = this.add.rectangle(400, 365, 120, 40, 0x4a7c59)
                        .setStrokeStyle(4, 0xffffff)
                        .setDepth(4)
                        .setInteractive({ useHandCursor: true });

                    // Membuat tulisan "MULAI" di tengah kotak hijau
                    let btnText = this.add.text(400, 365, "MULAI", {
                        fontFamily: "'VT323', monospace",
                        fontSize: "18px",
                        fill: "#ffffff"
                    }).setOrigin(0.5).setDepth(5);

                    // Efek Interaktif Tombol (Hover & Klik)
                    btnBg.on('pointerover', () => { btnBg.setFillStyle(0x355e41); });
                    btnBg.on('pointerout', () => { btnBg.setFillStyle(0x4a7c59); });
                    
                    btnBg.on('pointerdown', () => {
                        window.landingGame.destroy(true);
                        window.landingGame = null;
                        bukaPage(2);
                    });
                },
                update: function() {
                    this.clouds.children.iterate(function(cl) {
                        if (cl && cl.x > 860) { cl.x = -60; cl.y = Phaser.Math.Between(30, 90); }
                    });
                    this.birds.children.iterate(function(b) {
                        if (b && b.x > 850) { b.x = -50; b.y = Phaser.Math.Between(100, 170); }
                    });
                }
            }
        };
        window.landingGame = new Phaser.Game(configLanding);
    }

    // Fungsi placeholder singkat untuk Page 2 & 3
    function initGameMobil() { 
        new Phaser.Game({ type: Phaser.AUTO, width: 800, height: 450, parent: 'game-mobil-container', scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, scene: { create: function() { this.add.text(400, 225, 'GAME MOBIL - Klik untuk lanjut', {fontSize: '20px'}).setOrigin(0.5); this.input.on('pointerdown', () => { this.sys.game.destroy(true); bukaPage(3); }); } } });
    }
    function initGameSideScroller() { 
        new Phaser.Game({ type: Phaser.AUTO, width: 800, height: 450, parent: 'game-side-container', scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, scene: { create: function() { this.add.text(400, 225, 'GAME SIDE SCROLLING - Klik untuk ke Awal', {fontSize: '20px'}).setOrigin(0.5); this.input.on('pointerdown', () => { this.sys.game.destroy(true); bukaPage(1); }); } } });
    }
</script>
</body>
</html>
