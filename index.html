<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Undangan Pernikahan Interaktif</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #111116; 
            overflow: hidden; 
            position: fixed; 
            
            display: flex; 
            justify-content: center; 
            align-items: center; 
            /* Mencegah gesture 'pull-to-refresh' di Chrome Mobile */
            overscroll-behavior-y: contain; 
        }
        
        .page { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            display: none; 
            justify-content: center; 
            align-items: center; 
        }
        .active { display: flex; }
        
        /* BINGKAI UTAMA GAME (Letterbox Proporsional otomatis via JS) */
        .game-canvas-container {
            position: absolute; 
            width: 800px;
            height: 450px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            top: 50%;
            left: 50%;
            /* Mengunci poros pembesaran tepat di tengah container */
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center;
            flex-shrink: 0; 
        }

        #landing-bg-container {
            width: 800px;
            height: 450px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1; 
        }
        
        canvas { image-rendering: pixelated; display: block; }

        /* TEKS OVERLAY */
        .ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; 
            justify-content: flex-start; 
            align-items: center;
            text-shadow: 2px 2px 0px #000000;
            text-align: center;
            box-sizing: border-box;
            padding-top: 135px; 
            pointer-events: none; 
            z-index: 2; 
        }
        
        .ui-overlay h2, .ui-overlay h1, .ui-overlay p { pointer-events: none; }
        
        .ui-overlay h2 {
            font-family: 'VT323', monospace;
            color: #ffb804;
            font-size: 20px;
            margin: 0;
            letter-spacing: 2px;
        }

        .ui-overlay h1 {
            font-family: 'Playfair Display', serif;
            color: #a5a5a5;
            font-size: 38px; 
            margin: 8px 0;   
            font-weight: bold;
        }

        .ui-overlay p {
            font-family: 'VT323', monospace;
            color: #ffb804;
            font-size: 18px;
            margin: 0;
            letter-spacing: 1px;
        }

        /* TOMBOL MULAI */
        .btn-start { 
            position: absolute;
            bottom: 45px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px; 
            font-size: 18px; 
            font-family: 'VT323', monospace;
            background-color: #4a7c59;
            color: white; 
            border: 4px solid #fff; 
            cursor: pointer; 
            box-shadow: 4px 4px 0px #000;
            pointer-events: auto !important; 
            z-index: 99999 !important; 
        }
        .btn-start:hover { background-color: #355e41; transform: translateX(-50%) translate(-2px); box-shadow: 6px 6px 0px #000; }
        .btn-start:active { transform: translateX(-50%) translate(2px); box-shadow: 2px 2px 0px #000; }

        /* PEMBERITAHUAN ROTASI (Dikendalikan penuh oleh JavaScript) */
        #rotate-instruction {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111116;
            color: #ffb804;
            z-index: 1000000; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'VT323', monospace;
            padding: 20px;
            box-sizing: border-box;
        }

        #rotate-instruction .icon-phone {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotateDevice 2s infinite ease-in-out;
        }

        #rotate-instruction h3 { font-size: 28px; margin: 0 0 10px 0; }
        #rotate-instruction p { font-size: 18px; color: #ffffff; margin: 0; }

        @keyframes rotateDevice {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="rotate-instruction">
        <div class="icon-phone">📱🔄</div>
        <h3>MOHON PUTAR PONSEL ANDA</h3>
        <p>Silakan aktifkan rotasi layar otomatis dan gunakan mode Landscape (Mendatar) untuk kenyamanan perjalanan.</p>
    </div>

    <div id="page1" class="page active">
        <div class="game-canvas-container">
            <div id="landing-bg-container"></div>
            
            <div class="ui-overlay">
                <h2>THE WEDDING OF</h2>
                <h1>Mar'ie & Haiyi</h1>
                <p>KETUK UNTUK MEMULAI PERJALANAN</p>
            </div>

            <button class="btn-start" onclick="bukaPage(2)">MULAI</button>
        </div>
    </div>

    <div id="page2" class="page"><div class="game-canvas-container" id="game-mobil-container"></div></div>
    <div id="page3" class="page"><div class="game-canvas-container" id="game-side-container"></div></div>

<script>
    let currentMusic = null;

    // --- 🛠️ SOLUSI PARIPURNA: JS REAL-TIME RESPONSIVE LETTERBOX & ROTATION ---
    function kelolaUkuranDanRotasi() {
        const pnlInstruksi = document.getElementById('rotate-instruction');
        const containers = document.querySelectorAll('.game-canvas-container');
        
        // Membaca area pandang nyata (menghindari manipulasi Address Bar HP)
        const lebarLayar = window.innerWidth;
        const tinggiLayar = window.innerHeight;

        // 1. Deteksi Detektor HP Portrait Nyata via Ukuran Piksel
        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (isMobile && tinggiLayar > lebarLayar) {
            // HP Tegak -> Munculkan pelindung, sembunyikan game
            pnlInstruksi.style.display = 'flex';
            return;
        } else {
            // Desktop atau HP Mendatar -> Sembunyikan pelindung
            pnlInstruksi.style.display = 'none';
        }

        // 2. Hitung Skala Letterbox Berdasarkan Dimensi Target 800x450
        const targetW = 800;
        const targetH = 450;
        let skala = Math.min(lebarLayar / targetW, tinggiLayar / targetH);

        // Pasang skala secara paksa ke kontainer HTML
        containers.forEach(container => {
            container.style.transform = `translate(-50%, -50%) scale(${skala})`;
        });
    }

    // Pasang Event Listener super sensitif untuk menangkap rotasi di HP sungguhan
    window.addEventListener('resize', () => { setTimeout(kelolaUkuranDanRotasi, 150); });
    window.addEventListener('orientationchange', () => { setTimeout(kelolaUkuranDanRotasi, 150); });

    function bukaPage(pageNumber) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageNumber).classList.add('active');
        if (currentMusic) currentMusic.stop();

        setTimeout(kelolaUkuranDanRotasi, 100);

        if (pageNumber === 1) initLandingPage();
        else if (pageNumber === 2) initGameMobil();
        else if (pageNumber === 3) initGameSideScroller();
    }

    window.onload = () => { 
        initLandingPage(); 
        kelolaUkuranDanRotasi();
    };

    function initLandingPage() {
        if (window.landingGame) {
            putarMusik(window.landingGame.scene.scenes[0], 'bgm_page1');
            return;
        }
        
        const configLanding = {
            type: Phaser.AUTO,
            width: 800, height: 450,
            parent: 'landing-bg-container',
            // Sinkronisasi sistem skala internal Phaser dengan CSS luar
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: { default: 'arcade' },
            scene: {
                preload: function() {
                    this.load.image('custom_bg', 'assets/background_kamu.png'); 
                    this.load.image('sun', 'assets/matahari.png');
                    this.load.image('cloud', 'assets/awan.png');
                    this.load.image('bird', 'assets/burung.png');
                    this.load.audio('bgm_page1', 'assets/audio_page1.mp3');
                },
                create: function() {
                    putarMusik(this, 'bgm_page1');

                    // --- 1. BACKGROUND ---
                    let bg = this.add.image(400, 225, 'custom_bg').setDisplaySize(800, 450);
                    bg.setDepth(0);

                    // --- 2. AWAN BERGERAK CONTINUOUS ---
                    this.clouds = this.physics.add.group();
                    let jumlahAwan = 7; 
                    
                    for (let i = 0; i < jumlahAwan; i++) {
                        let posisiXAwal = i * 130 + Phaser.Math.Between(-30, 30);
                        let posisiYAwal = Phaser.Math.Between(30, 90);
                        let cl = this.clouds.create(posisiXAwal, posisiYAwal, 'cloud');
                        cl.setVelocityX(Phaser.Math.Between(6, 12)); 
                        cl.setAlpha(0.6); 
                        cl.setDepth(1); 
                    }

                    // --- 3. BURUNG BERGERAK ---
                    this.birds = this.physics.add.group();
                    let jumlahBurung = 3; 
                    
                    for (let i = 0; i < jumlahBurung; i++) {
                        let b = this.birds.create(Phaser.Math.Between(-300, -50), Phaser.Math.Between(100, 170), 'bird');
                        b.setScale(0.5); 
                        b.setVelocityX(Phaser.Math.Between(25, 40)); 
                        b.setDepth(2); 
                    }

                    // --- 4. MATAHARI/BORDER BINGKAI ---
                    this.sun = this.add.sprite(400, 190, 'sun').setScale(0.7);
                    this.sun.setDepth(3); 
                    
                    this.tweens.add({
                        targets: this.sun,
                        scale: { from: 0.68, to: 0.72 },
                        duration: 3500,
                        yoyo: true,
                        repeat: -1
                    });
                },
                update: function() {
                    this.clouds.children.iterate(function(cl) {
                        if (cl && cl.x > 860) {
                            cl.x = -60; 
                            cl.y = Phaser.Math.Between(30, 90);
                        }
                    });

                    this.birds.children.iterate(function(b) {
                        if (b && b.x > 850) {
                            b.x = -50;
                            b.y = Phaser.Math.Between(100, 170); 
                        }
                    });
                }
            }
        };
        window.landingGame = new Phaser.Game(configLanding);
    }

    function putarMusik(scene, key) {
        if (scene.sound.status === Phaser.Sound.Locked) return;
        try {
            currentMusic = scene.sound.add(key, { loop: true, volume: 0.4 });
            currentMusic.play();
        } catch(e) { console.log("Audio belum siap."); }
    }

    // Fungsi placeholder singkat untuk Page 2 & 3
    function initGameMobil() { 
        new Phaser.Game({ type: Phaser.AUTO, width: 800, height: 450, parent: 'game-mobil-container', scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, scene: { create: function() { this.add.text(400, 225, 'GAME MOBIL - Klik untuk lanjut', {fontSize: '20px'}).setOrigin(0.5); this.input.on('pointerdown', () => { this.sys.game.destroy(true); bukaPage(3); }); } } });
    }
    function initGameSideScroller() { 
        new Phaser.Game({ type: Phaser.AUTO, width: 800, height: 450, parent: 'game-side-container', scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, scene: { create: function() { this.add.text(400, 225, 'GAME SIDE SCROLLING - Klik untuk ke Awal', {fontSize: '20px'}).setOrigin(0.5); this.input.on('pointerdown', () => { this.sys.game.destroy(true); bukaPage(1); }); } } });
    }
</script>
</body>
</html>
