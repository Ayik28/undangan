<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Undangan Pernikahan Interaktif - Retro Arcade</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #c5c5c6; overflow: hidden; position: fixed;
            display: flex; justify-content: center; align-items: center; 
            font-family: 'VT323', monospace;
            overscroll-behavior-y: contain; 
        }

        /* 🕹️ CASING KONSOL ARCADE UTAMA */
        .arcade-console {
            width: 100vw;
            height: 100dvh; 
            max-width: 430px;  
            max-height: 820px;
            background: #a4a4a4; 
            border: 8px solid #1c1e22;
            border-radius: 20px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 12px; 
        }

        .console-header {
            width: 100%;
            text-align: center;
            color: #4e535c;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 6px;
            border-bottom: 3px double #1c1e22;
            padding-bottom: 4px;
        }

        /* 📺 LAYAR RASIO 3:4 */
        .screen-frame {
            width: 100%;
            aspect-ratio: 3 / 4; 
            background: #000;
            border: 6px solid #1c1e22;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        
        #game-container { width: 100%; height: 100%; }
        canvas { image-rendering: pixelated; width: 100% !important; height: 100% !important; }

        /* 🎮 AREA KONTROL BAWAH */
        .controls-area {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px; 
            box-sizing: border-box;
            position: relative;
        }

        .speaker-grille {
            position: absolute;
            bottom: 8px;
            right: 15px;
            width: 55px;
            height: 35px;
            background: repeating-linear-gradient(-45deg, #1c1e22, #1c1e22 4px, transparent 4px, transparent 12px);
            opacity: 0.4;
        }

        /* VIRTUAL D-PAD */
        .d-pad {
            position: relative;
            width: 110px;
            height: 110px;
        }
        .d-btn {
            position: absolute;
            background: #1c1e22;
            border: 2px solid #000;
            color: #555;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            box-shadow: inset 0 3px 5px rgba(255,255,255,0.1);
        }
        .d-btn:active { background: #000; color: #fff; }
        
        .d-left  { top: 35px; left: 0; width: 38px; height: 38px; border-radius: 5px 0 0 5px; }
        .d-right { top: 35px; right: 0; width: 38px; height: 38px; border-radius: 0 5px 5px 0; }
        .d-center { top: 35px; left: 38px; width: 34px; height: 38px; background: #1c1e22; box-shadow: none; border-top: 2px solid #000; border-bottom: 2px solid #000; border-left:none; border-right:none;}

        /* TOMBOL AKSI KANAN */
        .action-buttons {
            display: flex;
            gap: 12px;
            transform: rotate(-15deg); 
        }
        .action-btn {
            width: 46px;
            height: 46px;
            background: #a61e22; 
            border: 3px solid #1c1e22;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 0 #611012, inset 0 2px 4px rgba(255,255,255,0.3);
        }
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #611012;
        }
        .btn-label {
            font-size: 11px;
            color: #1c1e22;
            text-align: center;
            margin-top: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="arcade-console">
        <div class="console-header">★ RETRO WEDDING SYSTEM ★</div>
        
        <div class="screen-frame">
            <div id="game-container"></div>
        </div>
        
        <div class="controls-area">
            <div class="d-pad">
                <div class="d-btn d-left" id="btn-left">◀</div>
                <div class="d-btn d-center"></div>
                <div class="d-btn d-right" id="btn-right">▶</div>
            </div>
            
            <div class="action-buttons">
                <div>
                    <div class="action-btn" id="btn-action-b">B</div>
                    <div class="btn-label">SELECT</div>
                </div>
                <div>
                    <div class="action-btn" id="btn-action-a">A</div>
                    <div class="btn-label">START</div>
                </div>
            </div>

            <div class="speaker-grille"></div>
        </div>
    </div>

<script>
    let currentMusic = null;
    let phaserGameInstance = null;
    let globalActivePage = 1;
    let isTransitioning = false; 

    window.virtualController = {
        leftPressed: false,
        rightPressed: false,
        actionAPressed: false,
        actionBPressed: false
    };

    const setVirtualInput = (elementId, keyProp) => {
        const el = document.getElementById(elementId);
        if (!el) return;
        const startAction = (e) => { e.preventDefault(); window.virtualController[keyProp] = true; };
        const stopAction = () => { window.virtualController[keyProp] = false; };
        
        el.addEventListener('mousedown', startAction);
        el.addEventListener('mouseup', stopAction);
        el.addEventListener('touchstart', startAction);
        el.addEventListener('touchend', stopAction);
    };

    setTimeout(() => {
        setVirtualInput('btn-left', 'leftPressed');
        setVirtualInput('btn-right', 'rightPressed');
        setVirtualInput('btn-action-a', 'actionAPressed');
        setVirtualInput('btn-action-b', 'actionBPressed');
    }, 500);

    function bukaPage(pageNumber) {
        globalActivePage = pageNumber;
        if (pageNumber === 1) {
            if (currentMusic) currentMusic.stop();
            if (phaserGameInstance) phaserGameInstance.destroy(true);
            initLandingPage();
        } 
        else if (pageNumber === 2) {
            isTransitioning = true;
        }
    }

    window.onload = () => { bukaPage(1); };

    // =========================================================================
    // 🌅 SCENE 1: LANDING PAGE
    // =========================================================================
    function initLandingPage() {
        isTransitioning = false;
        
        const configLanding = {
            type: Phaser.AUTO,
            width: 600, height: 800,
            parent: 'game-container',
            physics: { default: 'arcade' },
            scene: {
                preload: function() {
                    this.load.image('custom_bg', 'assets/background_kamu.png'); 
                    this.load.image('sun', 'assets/matahari.png');
                    this.load.image('cloud', 'assets/awan.png');
                    this.load.image('bird', 'assets/burung.png');
                    this.load.audio('bgm_page1', 'assets/audio_page1.mp3');
                },
                create: function() {
                    if (this.sound.status !== Phaser.Sound.Locked) {
                        try {
                            currentMusic = this.sound.add('bgm_page1', { loop: true, volume: 0.4 });
                            currentMusic.play();
                        } catch(e) {}
                    }

                    this.add.image(300, 400, 'custom_bg').setDisplaySize(600, 800);

                    this.clouds = this.physics.add.group();
                    for (let i = 0; i < 6; i++) {
                        this.clouds.create(i * 120, Phaser.Math.Between(40, 150), 'cloud').setVelocityX(Phaser.Math.Between(6, 12)).setAlpha(0.6);
                    }
                    this.birds = this.physics.add.group();
                    for (let i = 0; i < 2; i++) {
                        this.birds.create(Phaser.Math.Between(-200, -50), Phaser.Math.Between(180, 280), 'bird').setScale(0.5).setVelocityX(Phaser.Math.Between(25, 40));
                    }

                    this.sun = this.add.sprite(300, 390, 'sun').setScale(0.7);
                    this.tweens.add({ targets: this.sun, scale: { from: 0.68, to: 0.72 }, duration: 3500, yoyo: true, repeat: -1 });

                    this.add.text(300, 340, "THE WEDDING OF", { fontFamily: "'VT323'", fontSize: "22px", fill: "#ffb804" }).setOrigin(0.5).setShadow(2, 2, '#000', 0);
                    this.add.text(300, 380, "Mar'ie & Haiyi", { fontFamily: "'Playfair Display'", fontSize: "38px", fill: "#ffffff", fontWeight: "bold" }).setOrigin(0.5).setShadow(2, 2, '#000', 0);
                    this.add.text(300, 420, "TEKAN TOMBOL [A] UNTUK MULAI", { fontFamily: "'VT323'", fontSize: "20px", fill: "#ffb804" }).setOrigin(0.5).setShadow(1, 1, '#000', 0);

                    // --- ☁️ KUMPULAN BLOK TRANSISI AWAN (GRID MATRIX) ---
                    this.groupTransisi = this.add.group();
                    
                    // Kita buat 6 baris awan bertumpuk dari atas ke bawah (Y: 50 sampai 750)
                    for (let y = 50; y <= 750; y += 130) {
                        // Baris ganjil muncul dari kiri, baris genap muncul dari kanan
                        let dariKiri = (y % 260 === 50);
                        
                        // Kita buat 3 awan berdampingan per baris agar menutupnya tebal dan rapat
                        for (let xOffset = 0; xOffset < 3; xOffset++) {
                            let xAwal = dariKiri ? (-150 - (xOffset * 80)) : (750 + (xOffset * 80));
                            let targetX = dariKiri ? (150 + (xOffset * 80)) : (450 - (xOffset * 80));
                            
                            let awanBlok = this.add.image(xAwal, y, 'cloud');
                            // Ukuran awan konstan/proporsional (Anti-Stretch & Anti-Squeeze)
                            awanBlok.setDisplaySize(240, 160).setDepth(100).setAlpha(1);
                            
                            // Menyimpan data target posisi tengah untuk animasi nanti
                            awanBlok.setData('targetX', targetX);
                            this.groupTransisi.add(awanBlok);
                        }
                    }
                },
                update: function() {
                    this.clouds.children.iterate(cl => { if (cl && cl.x > 650) cl.x = -50; });
                    this.birds.children.iterate(b => { if (b && b.x > 650) b.x = -50; });

                    // Pemicu animasi penutupan tirai awan berkelompok
                    if (window.virtualController.actionAPressed && !isTransitioning) {
                        window.virtualController.actionAPressed = false;
                        bukaPage(2); 

                        let totalAwan = this.groupTransisi.getLength();
                        let awanSelesai = 0;

                        this.groupTransisi.children.iterate(awanBlok => {
                            this.tweens.add({
                                targets: awanBlok,
                                x: awanBlok.getData('targetX'),
                                duration: 700,
                                // Beri sedikit variasi delay acak agar penutupan terlihat organik dan tidak kaku
                                delay: Phaser.Math.Between(0, 150),
                                ease: 'Cubic.easeOut',
                                onComplete: () => {
                                    awanSelesai++;
                                    // Jika semua baris awan sudah berkumpul rapat di tengah, ganti scene!
                                    if (awanSelesai === totalAwan) {
                                        if (currentMusic) currentMusic.stop();
                                        phaserGameInstance.destroy(true);
                                        phaserGameInstance = null;
                                        initGameMobil();
                                    }
                                }
                            });
                        });
                    }
                }
            }
        };
        phaserGameInstance = new Phaser.Game(configLanding);
    }

    // =========================================================================
    // 🏎️ SCENE 2: GAME MOBIL KLASIK (AWAN MEMBUKA KEMBALI)
    // =========================================================================
    function initGameMobil() {
        const configMobil = {
            type: Phaser.AUTO,
            width: 600, height: 800,
            parent: 'game-container',
            physics: { default: 'arcade' },
            scene: {
                preload: function() {
                    this.load.image('road', 'assets/jalan_raya.png'); 
                    this.load.image('player_car', 'assets/mobil_kamu.png'); 
                    this.load.image('cloud', 'assets/awan.png'); 
                },
                create: function() {
                    this.road = this.add.tileSprite(300, 400, 600, 800, 'road');
                    this.player = this.physics.add.sprite(300, 700, 'player_car');
                    this.player.setCollideWorldBounds(true);

                    this.cursors = this.input.keyboard.createCursorKeys();
                    this.add.text(20, 20, "PAGE 2: JALAN RAYA MELAJU (3:4)", { fontFamily: "'VT323'", fontSize: "20px", fill: "#fff" }).setDepth(1);

                    // --- ☁️ BUAT KEMBALI STRUKTUR AWAN DALAM POSISI MENUTUP TENGAH ---
                    this.groupMembuka = this.add.group();
                    
                    for (let y = 50; y <= 750; y += 130) {
                        let dariKiri = (y % 260 === 50);
                        
                        for (let xOffset = 0; xOffset < 3; xOffset++) {
                            // Posisinya berawal tepat di titik koordinat tengah menutup layar
                            let xTengah = dariKiri ? (150 + (xOffset * 80)) : (450 - (xOffset * 80));
                            let xKeluar = dariKiri ? (-150 - (xOffset * 80)) : (750 + (xOffset * 80));
                            
                            let awanBlok = this.add.image(xTengah, y, 'cloud');
                            awanBlok.setDisplaySize(240, 160).setDepth(100);
                            
                            awanBlok.setData('xKeluar', xKeluar);
                            this.groupMembuka.add(awanBlok);
                        }
                    }

                    // Jalankan animasi awan bubar membuka ke arah luar layar luar
                    this.groupMembuka.children.iterate(awanBlok => {
                        this.tweens.add({
                            targets: awanBlok,
                            x: awanBlok.getData('xKeluar'),
                            duration: 700,
                            delay: Phaser.Math.Between(100, 250), // Jeda tipis sebelum awan bubar
                            ease: 'Cubic.easeIn',
                            onComplete: () => {
                                awanBlok.destroy(); // Hapus dari memori setelah keluar layar
                                isTransitioning = false; // Buka kunci kendali mobil pemain
                            }
                        });
                    });
                },
                update: function() {
                    if (!isTransitioning) {
                        this.road.tilePositionY -= 6; 
                    }

                    if (this.cursors.left.isDown || window.virtualController.leftPressed) {
                        this.player.setVelocityX(-250);
                    } else if (this.cursors.right.isDown || window.virtualController.rightPressed) {
                        this.player.setVelocityX(250);
                    } else {
                        this.player.setVelocityX(0);
                    }
                }
            }
        };
        phaserGameInstance = new Phaser.Game(configMobil);
    }
</script>
</body>
</html>
