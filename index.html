<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Undangan Pernikahan Interaktif</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #2c3e50; 
            
            /* KUNCI TOTAL: Mematikan semua potensi scroll dan pergeseran di HP */
            overflow: hidden; 
            position: fixed; /* Memaksa body diam di tempat, anti-geser saat di-refresh */
            
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .page { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            display: none; 
            justify-content: center; 
            align-items: center; 
        }
        .active { display: flex; }
        
        /* WADAH UTAMA GAME (DILOCK TENGAH MUTLAK & AUTO CROP PINGGIRAN DI HP) */
        .game-canvas-container {
            position: absolute; 
            width: 800px;
            height: 450px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            flex-shrink: 0; 
        }

        /* Wadah untuk menempelkan game Phaser */
        #landing-bg-container {
            width: 800px;
            height: 450px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1; /* Di bawah teks overlay dan tombol */
        }
        
        canvas { image-rendering: pixelated; width: 100%; height: 100%; }

        /* TEKS KUSTOMISASI */
        .ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; 
            justify-content: flex-start; 
            align-items: center;
            text-shadow: 2px 2px 0px #000000;
            text-align: center;
            box-sizing: border-box;
            padding-top: 135px; 
            
            /* Lapisan di atas canvas Phaser */
            pointer-events: none; 
            z-index: 2; 
        }
        
        .ui-overlay h2, .ui-overlay h1, .ui-overlay p {
            pointer-events: none; /* Klik tikus/sentuhan menembus teks */
        }
        
        .ui-overlay h2 {
            font-family: 'VT323', monospace;
            color: #ffb804;
            font-size: 20px;
            margin: 0;
            letter-spacing: 2px;
        }

        .ui-overlay h1 {
            font-family: 'Playfair Display', serif;
            color: #a5a5a5;
            font-size: 38px; 
            margin: 8px 0;   
            font-weight: bold;
        }

        .ui-overlay p {
            font-family: 'VT323', monospace;
            color: #ffb804;
            font-size: 18px;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0px #000000;
        }

        /* TOMBOL MULAI MANDIRI */
        .btn-start { 
            position: absolute;
            bottom: 45px; /* Mengunci jarak pas di bawah baris teks <p> */
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px; 
            font-size: 18px; 
            font-family: 'VT323', monospace;
            background-color: #4a7c59;
            color: white; 
            border: 4px solid #fff; 
            cursor: pointer; 
            box-shadow: 4px 4px 0px #000;
            
            /* Kunci agar tombol berada di kasta lapisan teratas dan selalu bisa diklik */
            pointer-events: auto !important; 
            z-index: 99999 !important; 
        }
        .btn-start:hover { background-color: #355e41; transform: translate(-50%, -2px); box-shadow: 6px 6px 0px #000; }
        .btn-start:active { transform: translate(-50%, 2px); box-shadow: 2px 2px 0px #000; }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <div class="game-canvas-container">
            <div id="landing-bg-container"></div>
            
            <div class="ui-overlay">
                <h2>THE WEDDING OF</h2>
                <h1>Mar'ie & Haiyi</h1>
                <p>KETUK UNTUK MEMULAI PERJALANAN</p>
            </div>

            <button class="btn-start" onclick="bukaPage(2)">MULAI</button>
        </div>
    </div>

    <div id="page2" class="page"><div class="game-canvas-container" id="game-mobil-container"></div></div>
    <div id="page3" class="page"><div class="game-canvas-container" id="game-side-container"></div></div>

<script>
    let currentMusic = null;

    function bukaPage(pageNumber) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageNumber).classList.add('active');
        if (currentMusic) currentMusic.stop();

        if (pageNumber === 1) initLandingPage();
        else if (pageNumber === 2) initGameMobil();
        else if (pageNumber === 3) initGameSideScroller();
    }

    window.onload = () => { initLandingPage(); };

    function initLandingPage() {
        if (window.landingGame) {
            putarMusik(window.landingGame.scene.scenes[0], 'bgm_page1');
            return;
        }
        
        const configLanding = {
            type: Phaser.AUTO,
            width: 800, height: 450,
            parent: 'landing-bg-container',
            physics: { default: 'arcade' },
            scene: {
                preload: function() {
                    this.load.image('custom_bg', 'assets/background_kamu.png'); 
                    this.load.image('sun', 'assets/matahari.png');
                    this.load.image('cloud', 'assets/awan.png');
                    this.load.image('bird', 'assets/burung.png');
                    this.load.audio('bgm_page1', 'assets/audio_page1.mp3');
                },
                create: function() {
                    putarMusik(this, 'bgm_page1');

                    // --- 1. BACKGROUND ---
                    let bg = this.add.image(400, 225, 'custom_bg').setDisplaySize(800, 450);
                    bg.setDepth(0);

                    // --- 2. AWAN BERGERAK CONTINUOUS ---
                    this.clouds = this.physics.add.group();
                    let jumlahAwan = 7; 
                    
                    for (let i = 0; i < jumlahAwan; i++) {
                        let posisiXAwal = i * 130 + Phaser.Math.Between(-30, 30);
                        let posisiYAwal = Phaser.Math.Between(30, 90);
                        let cl = this.clouds.create(posisiXAwal, posisiYAwal, 'cloud');
                        cl.setVelocityX(Phaser.Math.Between(6, 12)); 
                        cl.setAlpha(0.6); 
                        cl.setDepth(1); 
                    }

                    // --- 3. BURUNG BERGERAK ---
                    this.birds = this.physics.add.group();
                    let jumlahBurung = 3; 
                    
                    for (let i = 0; i < jumlahBurung; i++) {
                        let b = this.birds.create(Phaser.Math.Between(-300, -50), Phaser.Math.Between(100, 170), 'bird');
                        b.setScale(0.5); 
                        b.setVelocityX(Phaser.Math.Between(25, 40)); 
                        b.setDepth(2); 
                    }

                    // --- 4. MATAHARI/BORDER BINGKAI ---
                    this.sun = this.add.sprite(400, 190, 'sun').setScale(0.7);
                    this.sun.setDepth(3); 
                    
                    this.tweens.add({
                        targets: this.sun,
                        scale: { from: 0.68, to: 0.72 },
                        duration: 3500,
                        yoyo: true,
                        repeat: -1
                    });
                },
                update: function() {
                    this.clouds.children.iterate(function(cl) {
                        if (cl && cl.x > 860) {
                            cl.x = -60; 
                            cl.y = Phaser.Math.Between(30, 90);
                        }
                    });

                    this.birds.children.iterate(function(b) {
                        if (b && b.x > 850) {
                            b.x = -50;
                            b.y = Phaser.Math.Between(100, 170); 
                        }
                    });
                }
            }
        };
        window.landingGame = new Phaser.Game(configLanding);
    }

    function putarMusik(scene, key) {
        if (scene.sound.status === Phaser.Sound.Locked) return;
        try {
            currentMusic = scene.sound.add(key, { loop: true, volume: 0.4 });
            currentMusic.play();
        } catch(e) { console.log("Audio belum siap."); }
    }

    // Fungsi placeholder singkat untuk Page 2 & 3
    function initGameMobil() { 
        new Phaser.Game({ type: Phaser.AUTO, width: 800, height: 450, parent: 'game-mobil-container', scene: { create: function() { this.add.text(400, 225, 'GAME MOBIL - Klik untuk lanjut', {fontSize: '20px'}).setOrigin(0.5); this.input.on('pointerdown', () => { this.sys.game.destroy(true); bukaPage(3); }); } } });
    }
    function initGameSideScroller() { 
        new Phaser.Game({ type: Phaser.AUTO, width: 800, height: 450, parent: 'game-side-container', scene: { create: function() { this.add.text(400, 225, 'GAME SIDE SCROLLING - Klik untuk ke Awal', {fontSize: '20px'}).setOrigin(0.5); this.input.on('pointerdown', () => { this.sys.game.destroy(true); bukaPage(1); }); } } });
    }
</script>
</body>
</html>
